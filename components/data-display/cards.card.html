<!-- @dsCard group="Components" viewport="700x360" name="Cards, Badges & Stats" subtitle="Service cards, badges, trust metrics" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style> body { padding: 24px; background: var(--oe-surface-offwhite); } .grid{ display:grid; grid-template-columns:1fr 1fr; gap:20px } .badges{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px } </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const NS = window.OhioEndocrinologyDesignSystem_eecab4;
  const { Card, CardBody, CardIcon, CardTitle, CardText, CardLink, Badge, StatsStrip, Stat } = NS;
  ReactDOM.createRoot(document.getElementById('root')).render(
    <div>
      <div className="badges">
        <Badge color="teal">Board Certified</Badge>
        <Badge color="gold">Accepting New Patients</Badge>
        <Badge color="blue">Same-Week Visits</Badge>
        <Badge color="green">In-Network</Badge>
        <Badge color="navy">Telehealth</Badge>
      </div>
      <div className="grid">
        <Card>
          <CardBody>
            <CardIcon><i className="fa-solid fa-droplet" /></CardIcon>
            <CardTitle>Diabetes Management</CardTitle>
            <CardText>Personalized plans for type 1, type 2, and prediabetes with continuous glucose monitoring.</CardText>
            <CardLink href="#">Learn more</CardLink>
          </CardBody>
        </Card>
        <Card>
          <CardBody>
            <CardIcon><i className="fa-solid fa-heart-pulse" /></CardIcon>
            <CardTitle>Thyroid &amp; Parathyroid</CardTitle>
            <CardText>Evaluation and management of thyroid nodules, hypothyroidism, and Graves' disease.</CardText>
            <CardLink href="#">Learn more</CardLink>
          </CardBody>
        </Card>
      </div>
      <div style={{ marginTop: 20 }}>
        <StatsStrip variant="navy">
          <Stat number="25+" label="Years serving Ohio" />
          <Stat number="4.9★" label="Patient rating" />
          <Stat number="15k+" label="Patients cared for" />
          <Stat number="6" label="Northern Ohio offices" />
        </StatsStrip>
      </div>
    </div>
  );
</script>
</body>
</html>
