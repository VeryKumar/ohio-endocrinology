<!-- @dsCard group="Website" viewport="1280x760" name="Marketing site" subtitle="Homepage hero, services, testimonials, appointment form" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ohio Endocrinology</title>
<link rel="icon" href="../../assets/logo-mark.png">
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { padding-bottom: 44px; } /* room for the fixed announcement ticker */
  @keyframes oe-ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @media (prefers-reduced-motion: reduce) { [style*="oe-ticker"] { animation: none !important; } }
  .oe-map { filter: grayscale(1); }
  .oe-map:hover { filter: grayscale(0); }
  @media (max-width: 1100px) {
    .oe-desktop-nav { display: none !important; }
    .oe-burger { display: inline-flex !important; }
  }
  @media (max-width: 700px) {
    /* slim mobile header: drop street address + SMS line, keep HIPAA badge + phone */
    .oe-topbar-extra { display: none !important; }
    .oe-header-row { height: 70px !important; }
    .oe-brand-sub { max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  }
  @media (max-width: 860px) {
    .oe-desktop-nav { display: none !important; }
    .oe-burger { display: inline-flex !important; }
    .oe-hero-grid { grid-template-columns: 1fr !important; }
    .oe-grid-3 { grid-template-columns: 1fr !important; }
    .oe-grid-2 { grid-template-columns: 1fr !important; }
    .oe-footer-grid { grid-template-columns: 1fr 1fr !important; }
    .oe-form-row { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="services-data.js"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="Ticker.jsx"></script>
<script type="text/babel" src="ServiceDetail.jsx"></script>
<script type="text/babel" src="HomePage.jsx"></script>
<script type="text/babel">
  function App() {
    const [current, setCurrent] = React.useState('home');
    const nav = (key) => {
      setCurrent(key);
      if (key && key.indexOf('service:') === 0) { window.scrollTo({ top: 0 }); return; }
      if (key === 'home') { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
      const scrollToSection = () => {
        const el = document.getElementById(key);
        if (el) {
          const y = el.getBoundingClientRect().top + window.scrollY - 120;
          window.scrollTo({ top: y, behavior: 'smooth' });
        }
      };
      if (current && current.indexOf('service:') === 0) {
        setCurrent('home');
        setTimeout(scrollToSection, 60);
      } else {
        scrollToSection();
      }
    };
    const isService = current && current.indexOf('service:') === 0;
    const headerCur = isService ? 'services' : current;
    return (
      <React.Fragment>
        <a href="#main" style={{ position: 'absolute', left: -9999, top: 0 }}>Skip to content</a>
        <window.OEHeader current={headerCur} onNav={nav} />
        <main id="main">
          {isService
            ? <window.OEServiceDetail slug={current.slice(8)} onNav={nav} />
            : <window.OEHomePage onNav={nav} />}
        </main>
        <window.OEFooter />
        <window.OETicker />
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
