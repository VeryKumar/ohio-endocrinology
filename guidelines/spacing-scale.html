<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="4px base — sp-1 to sp-16" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 24px; background: #fff; font-family: var(--oe-font-body); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .col { text-align: center; }
  .bar { background: var(--oe-teal); border-radius: 3px; width: 100%; }
  .lbl { font-size: 11px; color: var(--oe-navy); font-weight: 600; margin-top: 6px; }
  .px { font-size: 10px; color: var(--oe-text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="bar" style="height:4px"></div><div class="lbl">1</div><div class="px">4px</div></div>
    <div class="col"><div class="bar" style="height:8px"></div><div class="lbl">2</div><div class="px">8px</div></div>
    <div class="col"><div class="bar" style="height:12px"></div><div class="lbl">3</div><div class="px">12px</div></div>
    <div class="col"><div class="bar" style="height:16px"></div><div class="lbl">4</div><div class="px">16px</div></div>
    <div class="col"><div class="bar" style="height:24px"></div><div class="lbl">6</div><div class="px">24px</div></div>
    <div class="col"><div class="bar" style="height:32px"></div><div class="lbl">8</div><div class="px">32px</div></div>
    <div class="col"><div class="bar" style="height:48px"></div><div class="lbl">12</div><div class="px">48px</div></div>
    <div class="col"><div class="bar" style="height:64px"></div><div class="lbl">16</div><div class="px">64px</div></div>
  </div>
</body>
</html>
