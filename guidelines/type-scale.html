<!-- @dsCard group="Type" viewport="700x220" name="Type scale" subtitle="Fluid heading sizes h1–h4" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 24px; background: #fff; }
  .line { display: flex; align-items: baseline; gap: 16px; margin-bottom: 6px; }
  .tag { font-family: var(--oe-font-body); font-size: 11px; color: var(--oe-text-muted); width: 130px; flex-shrink: 0; }
  .samp { font-family: var(--oe-font-display); font-weight: 700; color: var(--oe-navy); line-height: 1.2; }
</style>
</head>
<body>
  <div class="line"><span class="tag">h1 · clamp 2–3.75rem</span><span class="samp" style="font-size:2.6rem">Aa</span></div>
  <div class="line"><span class="tag">h2 · clamp 1.6–3rem</span><span class="samp" style="font-size:2rem">Aa</span></div>
  <div class="line"><span class="tag">h3 · clamp 1.3–1.875rem</span><span class="samp" style="font-size:1.5rem">Aa</span></div>
  <div class="line"><span class="tag">h4 · clamp 1.1–1.5rem</span><span class="samp" style="font-size:1.25rem">Aa</span></div>
</body>
</html>
