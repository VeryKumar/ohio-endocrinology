<!-- @dsCard group="Colors" viewport="700x150" name="Brand core" subtitle="Navy, blue, teal, gold" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 20px; background: #fff; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { flex: 1 1 100px; min-width: 100px; }
  .chip { height: 64px; border-radius: 10px; box-shadow: var(--oe-shadow-sm); }
  .name { font-family: var(--oe-font-body); font-size: 12px; font-weight: 600; color: var(--oe-navy); margin-top: 8px; }
  .hex { font-family: var(--oe-font-body); font-size: 11px; color: var(--oe-text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--oe-navy)"></div><div class="name">Navy</div><div class="hex">#0d2d4e</div></div>
    <div class="sw"><div class="chip" style="background:var(--oe-blue)"></div><div class="name">Blue</div><div class="hex">#1e5fa8</div></div>
    <div class="sw"><div class="chip" style="background:var(--oe-blue-light)"></div><div class="name">Blue light</div><div class="hex">#2e7dd1</div></div>
    <div class="sw"><div class="chip" style="background:var(--oe-teal)"></div><div class="name">Teal</div><div class="hex">#00b4a6</div></div>
    <div class="sw"><div class="chip" style="background:var(--oe-gold)"></div><div class="name">Gold</div><div class="hex">#c8922a</div></div>
    <div class="sw"><div class="chip" style="background:var(--oe-gold-light)"></div><div class="name">Gold light</div><div class="hex">#e8b84b</div></div>
  </div>
</body>
</html>
