<!-- @dsCard group="Colors" viewport="700x150" name="Semantic status" subtitle="Error, success, warning, info + pale bg" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 20px; background: #fff; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 44px; border-radius: 8px 8px 0 0; }
  .bg { height: 20px; border-radius: 0 0 8px 8px; border: 1px solid var(--oe-border); border-top: none; }
  .name { font-family: var(--oe-font-body); font-size: 12px; font-weight: 600; margin-top: 8px; }
  .hex { font-family: var(--oe-font-body); font-size: 11px; color: var(--oe-text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--oe-error)"></div><div class="bg" style="background:var(--oe-error-bg)"></div><div class="name" style="color:var(--oe-error)">Error</div><div class="hex">#dc2626</div></div>
    <div class="sw"><div class="chip" style="background:var(--oe-success)"></div><div class="bg" style="background:var(--oe-success-bg)"></div><div class="name" style="color:var(--oe-success)">Success</div><div class="hex">#16a34a</div></div>
    <div class="sw"><div class="chip" style="background:var(--oe-warning)"></div><div class="bg" style="background:var(--oe-warning-bg)"></div><div class="name" style="color:var(--oe-warning)">Warning</div><div class="hex">#d97706</div></div>
    <div class="sw"><div class="chip" style="background:var(--oe-info)"></div><div class="bg" style="background:var(--oe-info-bg)"></div><div class="name" style="color:var(--oe-info)">Info</div><div class="hex">#1e5fa8</div></div>
  </div>
</body>
</html>
