<!-- @dsCard group="Brand" viewport="700x180" name="Shadow scale" subtitle="Navy-tinted elevation, sm → xl" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 30px 24px; background: var(--oe-surface-offwhite); font-family: var(--oe-font-body); }
  .row { display: flex; gap: 26px; align-items: center; }
  .col { text-align: center; }
  .box { width: 96px; height: 64px; background: #fff; border-radius: 12px; }
  .lbl { font-size: 11px; color: var(--oe-navy); font-weight: 600; margin-top: 14px; }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="box-shadow:var(--oe-shadow-sm)"></div><div class="lbl">sm</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--oe-shadow-card)"></div><div class="lbl">card</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--oe-shadow-md)"></div><div class="lbl">md</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--oe-shadow-lg)"></div><div class="lbl">lg</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--oe-shadow-xl)"></div><div class="lbl">xl</div></div>
  </div>
</body>
</html>
