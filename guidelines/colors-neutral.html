<!-- @dsCard group="Colors" viewport="700x150" name="Slate neutrals" subtitle="Tailwind slate scale for text, borders, surfaces" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 20px; background: #fff; }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; }
  .chip { height: 56px; border-radius: 8px; border: 1px solid var(--oe-border); }
  .name { font-family: var(--oe-font-body); font-size: 10px; color: var(--oe-text-muted); margin-top: 6px; text-align: center; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--oe-slate-50)"></div><div class="name">50</div></div>
    <div class="sw"><div class="chip" style="background:var(--oe-slate-100)"></div><div class="name">100</div></div>
    <div class="sw"><div class="chip" style="background:var(--oe-slate-200)"></div><div class="name">200</div></div>
    <div class="sw"><div class="chip" style="background:var(--oe-slate-300)"></div><div class="name">300</div></div>
    <div class="sw"><div class="chip" style="background:var(--oe-slate-400)"></div><div class="name">400</div></div>
    <div class="sw"><div class="chip" style="background:var(--oe-slate-500)"></div><div class="name">500</div></div>
    <div class="sw"><div class="chip" style="background:var(--oe-slate-600)"></div><div class="name">600</div></div>
    <div class="sw"><div class="chip" style="background:var(--oe-slate-700)"></div><div class="name">700</div></div>
    <div class="sw"><div class="chip" style="background:var(--oe-slate-800)"></div><div class="name">800</div></div>
    <div class="sw"><div class="chip" style="background:var(--oe-slate-900)"></div><div class="name">900</div></div>
  </div>
</body>
</html>
